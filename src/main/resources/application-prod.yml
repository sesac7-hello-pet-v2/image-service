spring:
  config:
    activate:
      on-profile: prod
  aws:
    s3:
      bucket-name: ${AWS_S3_BUCKET_NAME}
      region: ${AWS_S3_REGION}
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      # 업로드 가능한 파일 확장자
      allowed-extensions: jpg,jpeg,png,gif,webp
      # 최대 파일 크기 (바이트)
      max-file-size: 10485760 # 10MB
