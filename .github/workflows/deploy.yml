name: Deploy Image Service to ECR

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy without path changes'
        required: false
        default: 'false'

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: sesac-hello-pet-ecr-image-service
  SERVICE_NAME: image-service
  SERVICE_PORT: 8088
  SPRING_PROFILES_ACTIVE: prod

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ env.SERVICE_NAME }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.SERVICE_NAME }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew test --no-daemon

      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # Docker 이미지 빌드
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

          # 태그 생성 (Terraform ECR 정책에 맞게)
          docker tag $ECR_REPOSITORY:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker tag $ECR_REPOSITORY:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          # 브랜치별 태그 전략 (IMMUTABLE_WITH_EXCLUSION 정책 준수)
          if [[ "$BRANCH_NAME" == "develop" ]]; then
            docker tag $ECR_REPOSITORY:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-develop
            echo "Tagged as dev-develop for develop branch"
          elif [[ "$BRANCH_NAME" == "release" ]]; then
            docker tag $ECR_REPOSITORY:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:v$(date +%Y%m%d)-${{ github.sha }}
            echo "Tagged as production version for release branch"
          elif [[ "$BRANCH_NAME" =~ ^dev/.* ]]; then
            docker tag $ECR_REPOSITORY:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-${BRANCH_NAME#dev/}
            echo "Tagged as dev-${BRANCH_NAME#dev/} for personal dev branch"
          elif [[ "$BRANCH_NAME" =~ ^qa/.* ]]; then
            docker tag $ECR_REPOSITORY:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:qa-${BRANCH_NAME#qa/}
            echo "Tagged as qa-${BRANCH_NAME#qa/} for qa branch"
          fi

          # ECR에 푸시 (중복 확인)
          echo "Pushing images to ECR..."

          # 이미지 존재 여부 확인 함수
          check_image_exists() {
            local tag=$1
            aws ecr describe-images --repository-name ${{ env.ECR_REPOSITORY }} --image-ids imageTag=$tag --region ${{ env.AWS_REGION }} >/dev/null 2>&1
          }

          # commit hash 태그 푸시 (중복 확인)
          if check_image_exists "$IMAGE_TAG"; then
            echo "Image with tag $IMAGE_TAG already exists, skipping push"
          else
            docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          fi

          # latest 태그는 항상 푸시 (덮어쓰기 허용)
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest || echo "Latest push failed, continuing..."

          # 브랜치별 추가 태그 푸시 (덮어쓰기 허용)
          if [[ "$BRANCH_NAME" == "develop" ]]; then
            docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-develop || echo "dev-develop push failed, continuing..."
          elif [[ "$BRANCH_NAME" == "release" ]]; then
            PROD_TAG="v$(date +%Y%m%d)-${{ github.sha }}"
            if check_image_exists "$PROD_TAG"; then
              echo "Production image with tag $PROD_TAG already exists, skipping push"
            else
              docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$PROD_TAG
            fi
          elif [[ "$BRANCH_NAME" =~ ^dev/.* ]]; then
            docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-${BRANCH_NAME#dev/} || echo "dev branch push failed, continuing..."
          elif [[ "$BRANCH_NAME" =~ ^qa/.* ]]; then
            docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:qa-${BRANCH_NAME#qa/} || echo "qa branch push failed, continuing..."
          fi

      - name: Get image details
        id: image-details
        run: |
          echo "image-uri=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image-tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Checkout manifest repository
        uses: actions/checkout@v4
        with:
          repository: sesac7-hello-pet-v2/hello-pet-manifest
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifest-repo

      - name: Update manifest repository
        env:
          IMAGE_TAG: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          cd manifest-repo/${{ env.SERVICE_NAME }}

          # 브랜치별 태그 업데이트 전략
          if [[ "$BRANCH_NAME" == "develop" ]]; then
            # develop 브랜치는 commit hash로 업데이트
            sed -i "s|tag:.*|tag: \"$IMAGE_TAG\"|g" values.yaml
            echo "Updated develop branch with commit hash: $IMAGE_TAG"
          elif [[ "$BRANCH_NAME" == "release" ]]; then
            # release 브랜치는 production 버전 태그로 업데이트
            PROD_TAG="v$(date +%Y%m%d)-$IMAGE_TAG"
            sed -i "s|tag:.*|tag: \"$PROD_TAG\"|g" values.yaml
            echo "Updated release branch with production tag: $PROD_TAG"
          else
            # 기타 브랜치는 commit hash 사용
            sed -i "s|tag:.*|tag: \"$IMAGE_TAG\"|g" values.yaml
            echo "Updated $BRANCH_NAME branch with commit hash: $IMAGE_TAG"
          fi

          # 변경사항 확인
          echo "Updated values.yaml:"
          grep "tag:" values.yaml

      - name: Commit and push manifest changes
        env:
          IMAGE_TAG: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          cd manifest-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 최대 5번 재시도
          for i in {1..5}; do
            echo "Attempt $i to update manifest..."

            # 최신 상태로 pull
            git pull origin main || git pull origin master || true

            git add ${{ env.SERVICE_NAME }}/values.yaml

            # 브랜치별 커밋 메시지
            if [[ "$BRANCH_NAME" == "develop" ]]; then
              COMMIT_MSG="🚀 Update ${{ env.SERVICE_NAME }} image tag to $IMAGE_TAG (develop)"
            elif [[ "$BRANCH_NAME" == "release" ]]; then
              PROD_TAG="v$(date +%Y%m%d)-$IMAGE_TAG"
              COMMIT_MSG="🎉 Release ${{ env.SERVICE_NAME }} production version $PROD_TAG"
            else
              COMMIT_MSG="🔧 Update ${{ env.SERVICE_NAME }} image tag to $IMAGE_TAG ($BRANCH_NAME)"
            fi

            # 변경사항이 있는 경우에만 커밋
            if git diff --staged --quiet; then
              echo "No changes to commit"
              break
            fi

            git commit -m "$COMMIT_MSG" || continue

            # 푸시 시도
            if git push; then
              echo "Successfully pushed manifest changes"
              break
            else
              echo "Push failed, retrying in $((i * 2)) seconds..."
              sleep $((i * 2))

              # 충돌 해결을 위해 리베이스 시도
              git pull --rebase origin main || git pull --rebase origin master || true
            fi
          done

      - name: Summary
        run: |
          echo "## 🚀 Image Service Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | ${{ env.ECR_REPOSITORY }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Port | ${{ env.SERVICE_PORT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI | ${{ steps.image-details.outputs.image-uri }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manifest Updated | ✅ |" >> $GITHUB_STEP_SUMMARY

  notify:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "✅ Image Service successfully deployed to ECR"
            echo "🏷️ Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          else
            echo "❌ Image Service deployment failed"
            exit 1
          fi
